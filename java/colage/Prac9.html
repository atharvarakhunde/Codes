<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contest Scoreboard - Tic Tac Toe</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center p-6 text-center font-sans">
  <h2 class="text-2xl font-bold mb-4">🎮 Tic Tac Toe</h2>

  <div id="board" class="grid grid-cols-3 gap-2 w-60 mb-4"></div>

  <div class="text-lg font-semibold">
    📊 <span class="underline">Contest Scoreboard</span><br>
    Player X: <span id="xScore">0</span> | Player O: <span id="oScore">0</span>
  </div>

  <button onclick="resetGame()" class="mt-4 px-4 py-1 bg-blue-500 text-white rounded hover:bg-blue-600">
    Reset Game
  </button>

  <script>
    const board = document.getElementById("board");
    const xScoreEl = document.getElementById("xScore");
    const oScoreEl = document.getElementById("oScore");
    let cells = [], player = 'X', xScore = 0, oScore = 0;

    function init() {
      board.innerHTML = ""; cells = [];
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.className = "bg-white h-20 flex items-center justify-center text-2xl font-bold cursor-pointer shadow";
        cell.addEventListener("click", () => move(i));
        board.appendChild(cell); cells.push(cell);
      }
    }

    function move(i) {
      if (cells[i].textContent) return;
      cells[i].textContent = player;
      if (win()) {
        alert(`Player ${player} wins!`);
        player === 'X' ? xScore++ : oScore++;
        update(); return init();
      }
      if (cells.every(c => c.textContent)) return alert("Draw!"), init();
      player = player === 'X' ? 'O' : 'X';
    }

    function win() {
      return [[0,1,2],[3,4,5],[6,7,8],[0,3,6],
              [1,4,7],[2,5,8],[0,4,8],[2,4,6]]
             .some(([a,b,c]) => cells[a].textContent === player && 
                                cells[b].textContent === player && 
                                cells[c].textContent === player);
    }

    function update() {
      xScoreEl.textContent = xScore;
      oScoreEl.textContent = oScore;
    }

    function resetGame() {
      xScore = oScore = 0;
      update(); init();
    }

    init();
  </script>
</body>
</html>
