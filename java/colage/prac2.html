<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Sweeper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #game-container {
            display: grid;
            gap: 5px;
            margin: 20px auto;
            justify-content: center;
        }
        .cell {
            width: 40px;
            height: 40px;
            background-color: lightgray;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
        .mine {
            background-color: red !important;
        }
    </style>
</head>
<body>
    <h1>Mine Sweeper</h1>
    <label>Grid Size:</label>
    <input type="number" id="grid-size" value="5" min="2" max="10">
    <label>Number of Mines:</label>
    <input type="number" id="mine-count" value="5" min="1">
    <button onclick="startGame()">Start Game</button>
    <h2>Points: <span id="score">0</span></h2>
    <div id="game-container"></div>
    <button onclick="startGame()">New Game</button>
    
    <script>
        let gridSize, mineCount, mines, score;
        
        function startGame() {
            gridSize = parseInt(document.getElementById("grid-size").value);
            mineCount = parseInt(document.getElementById("mine-count").value);
            score = 0;
            document.getElementById("score").textContent = score;
            generateMines();
            createGrid();
        }
        
        function generateMines() {
            mines = new Set();
            while (mines.size < mineCount) {
                let minePosition = Math.floor(Math.random() * (gridSize * gridSize));
                mines.add(minePosition);
            }
        }
        
        function createGrid() {
            const container = document.getElementById("game-container");
            container.innerHTML = "";
            container.style.gridTemplateColumns = `repeat(${gridSize}, 40px)`;
            container.style.gridTemplateRows = `repeat(${gridSize}, 40px)`;
            
            for (let i = 0; i < gridSize * gridSize; i++) {
                let cell = document.createElement("div");
                cell.classList.add("cell");
                cell.dataset.index = i;
                cell.addEventListener("click", handleCellClick);
                container.appendChild(cell);
            }
        }
        
        function handleCellClick(event) {
            let index = parseInt(event.target.dataset.index);
            if (mines.has(index)) {
                event.target.classList.add("mine");
                alert("Game Over! Your total score: " + score);
                document.getElementById("game-container").childNodes.forEach(cell => cell.removeEventListener("click", handleCellClick));
            } else {
                let points = Math.floor(Math.random() * 10) + 1;
                event.target.textContent = points;
                event.target.style.backgroundColor = "green";
                event.target.removeEventListener("click", handleCellClick);
                score += points;
                document.getElementById("score").textContent = score;
            }
        }
    </script>
</body>
</html>
